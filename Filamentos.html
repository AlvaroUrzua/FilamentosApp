const { useState, useEffect, useMemo, useCallback } = React;

const formatCLP = (n) => {
  if (n == null || isNaN(n)) return "—";
  return "$" + Math.round(n).toLocaleString("es-CL");
};

const AVAILABILITY = {
  "in-stock":     { label: "En stock",       dot: "var(--ok)" },

// ===== Swatch =====
function Swatch({ item, size = 64, shape = "rounded", owned = false, onClick, selected = false }) {
  const radiusByShape = { rounded: 10, square: 2, pill: size / 2, circle: "50%" };
  const radius = radiusByShape[shape] ?? 10;

  const c1 = item.color;
  const c2 = item.color2 || item.color;
  const finish = item.finish;

  let background = c1;
  if (finish === "dual" || (item.color2 && finish === "marble")) {
    background = `linear-gradient(135deg, ${c1} 0%, ${c1} 48%, ${c2} 52%, ${c2} 100%)`;
  } else if (finish === "marble") {
    background = `
      radial-gradient(ellipse 60% 30% at 30% 20%, ${c2} 0%, transparent 60%),
      radial-gradient(ellipse 40% 25% at 70% 70%, ${c2} 0%, transparent 55%),
      radial-gradient(ellipse 50% 20% at 20% 80%, ${c2} 0%, transparent 50%),
      ${c1}
    `;
  } else if (finish === "metallic") {
    background = `linear-gradient(135deg,
      color-mix(in oklab, ${c1} 100%, white 25%) 0%,
      ${c1} 45%,
      color-mix(in oklab, ${c1} 100%, black 20%) 100%)`;
  } else if (finish === "sparkle") {
    background = `
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.7) 0.5px, transparent 1.2px),
      radial-gradient(circle at 70% 20%, rgba(255,255,255,0.6) 0.5px, transparent 1.2px),
      radial-gradient(circle at 40% 70%, rgba(255,255,255,0.6) 0.5px, transparent 1.2px),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,0.8) 0.5px, transparent 1.5px),
      radial-gradient(circle at 55% 45%, rgba(255,255,255,0.5) 0.5px, transparent 1px),
      radial-gradient(circle at 15% 85%, rgba(255,255,255,0.7) 0.5px, transparent 1.2px),
      radial-gradient(circle at 90% 50%, rgba(255,255,255,0.6) 0.5px, transparent 1px),
      ${c1}
    `;
  } else if (finish === "translucent") {
    background = `linear-gradient(135deg,
      color-mix(in oklab, ${c1} 100%, white 40%) 0%,
      ${c1} 60%,
      color-mix(in oklab, ${c1} 100%, black 10%) 100%)`;
  }

  const isLight = (() => {
    const hex = c1.replace("#", "");
    if (hex.length !== 6) return false;
    const r = parseInt(hex.slice(0, 2), 16);
    const g = parseInt(hex.slice(2, 4), 16);
    const b = parseInt(hex.slice(4, 6), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.78;
  })();

  return (
    <button
      className={`swatch ${selected ? "swatch--selected" : ""} ${owned ? "swatch--owned" : ""}`}
      onClick={onClick}
      style={{
        width: size,
        height: size,
        borderRadius: radius,
        background,
        boxShadow: finish === "glow"
          ? `inset 0 0 14px ${c1}, 0 0 0 1px ${isLight ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.08)"}`
          : `inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.12), 0 0 0 1px ${isLight ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.06)"}`,
      }}
      title={`${item.family} ${item.line} · ${item.name}${item.code ? ` · #${item.code}` : ""}`}
      aria-label={`${item.family} ${item.line} ${item.name}${item.code ? ` código ${item.code}` : ""}`}
    >
      {owned && (
        <span className="swatch-check" aria-label="En mi inventario">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1.5 5L4 7.5L8.5 2.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </span>
      )}
    </button>
  );
}

function parseGrams(str) {
  if (str == null) return NaN;
  const s = String(str).replace(",", ".").trim();
  if (!s) return NaN;
  const n = parseFloat(s);
  return isFinite(n) ? n : NaN;
}

function formatG(n) {
  const v = Math.round(n * 100) / 100;
  return `${v.toLocaleString("es-CL", { maximumFractionDigits: 2 })} g`;
}

function weightToGrams(w) {
  if (!w) return 1000;
  const m = String(w).match(/([\d.]+)\s*(kg|g)?/i);
  if (!m) return 1000;
  const n = parseFloat(m[1]);
  if (!isFinite(n)) return 1000;
  const unit = (m[2] || "kg").toLowerCase();
  return unit === "kg" ? n * 1000 : n;
}

function todayISO() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off * 60000);
  return local.toISOString().slice(0, 10);
}

function spoolUsed(sp) {
  return (sp.entries || []).reduce((s, e) => s + (parseFloat(e.grams) || 0), 0);
}
function spoolRemaining(sp) {
  return Math.max(0, (sp.initialG || 0) - spoolUsed(sp));
}

function useLocal(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw) return { ...initial, ...JSON.parse(raw) };
    } catch (e) {}
    return initial;
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }, [key, val]);
  return [val, setVal];
}

  const catalog = (typeof window !== "undefined" && window.BAMBU_CATALOG) || {};
  const catalogMatch = code && /^\d{4,5}$/.test(code) ? catalog[code] : null;
  const codeIsDuplicate = code && existingCodes.has(code);

  // Auto-fill form from catalog when the code matches
  useEffect(() => {
    if (!catalogMatch) return;
    setFamily(catalogMatch.family);
    setLine(catalogMatch.line);
    setName(catalogMatch.name);
    setColor(catalogMatch.color);
    setTempNozzle(catalogMatch.tempNozzle || "200-220°C");
    setTempBed(catalogMatch.tempBed || "35-55°C");
    setWeight(catalogMatch.weight || "1kg");
    setFinish(catalogMatch.finish || "");
    if (catalogMatch.color2) {
      setUseColor2(true);
      setColor2(catalogMatch.color2);
    }
  }, [code]); // eslint-disable-line

  const familyValue = family === "__new__" ? newFamily.trim() : family;
  const codeValid = !code || /^\d{4,5}$/.test(code);
  const canSubmit = familyValue && name.trim() && /^#[0-9A-Fa-f]{6}$/.test(color) && codeValid && !codeIsDuplicate;

  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    const item = {
      id: code ? `bambu-${code}` : `custom-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      family: familyValue,
      line: line.trim() || "Personalizado",
      name: name.trim(),
      color: color.toUpperCase(),
      priceCLP: parseInt(priceCLP) || 0,
      tempNozzle: tempNozzle.trim() || "—",
      tempBed: tempBed.trim() || "—",
      weight: weight.trim() || "1kg",
      custom: true,
    };
    if (code) item.code = code;
    if (useColor2 && /^#[0-9A-Fa-f]{6}$/.test(color2)) item.color2 = color2.toUpperCase();
    if (finish) item.finish = finish;
    onAdd(item);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <form className="modal" onClick={(e) => e.stopPropagation()} onSubmit={submit}>
        <div className="modal-head">
          <div className="modal-title">Agregar filamento</div>
          <button type="button" className="icon-btn" onClick={onClose} aria-label="Cerrar">
            <Icon.X />
          </button>
        </div>

        <div className="modal-tabs">
          <button
            type="button"
            className={`modal-tab ${mode === "code" ? "modal-tab--active" : ""}`}
            onClick={() => setMode("code")}
          >
            Por código Bambu
          </button>
          <button
            type="button"
            className={`modal-tab ${mode === "manual" ? "modal-tab--active" : ""}`}
            onClick={() => { setMode("manual"); setCode(""); }}
          >
            Manual
          </button>
        </div>

        <div className="modal-body">
          {mode === "code" && (
            <>
              <div className="form-row">
                <label className="form-label">Código Bambu (4-5 dígitos)</label>
                <input
                  className="form-input"
                  type="text"
                  inputMode="numeric"
                  placeholder="Ej: 10102"
                  value={code}
                  onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 5))}
                  autoFocus
                  style={{ fontFamily: "var(--font-mono)", fontSize: 16, letterSpacing: "0.05em" }}
                />
                {code && codeIsDuplicate && (
                  <div className="form-help form-help--warn">
                    Este código ya está en tu catálogo.
                  </div>
                )}
                {code && !codeIsDuplicate && catalogMatch && (
                  <div className="form-help form-help--ok">
                    ✓ Reconocido: <strong>{catalogMatch.family} {catalogMatch.line}</strong> — {catalogMatch.name}
                  </div>
                )}
                {code && !codeIsDuplicate && !catalogMatch && codeValid && (
                  <div className="form-help">
                    Código desconocido. Completa los datos manualmente abajo.
                  </div>
                )}
                {code && !codeValid && (
                  <div className="form-help form-help--warn">
                    El código debe tener 4 o 5 dígitos.
                  </div>
                )}
              </div>
              {!codeIsDuplicate && code && codeValid && (
                <div className="preview-row">
                  <div
                    className="preview-swatch"
                    style={{
                      background: useColor2 && /^#[0-9A-Fa-f]{6}$/.test(color2)
                        ? `linear-gradient(135deg, ${color} 0%, ${color} 48%, ${color2} 52%, ${color2} 100%)`
                        : color,
                    }}
                  />
                  <div className="preview-info">
                    <div className="preview-name">{name || "Sin nombre"}</div>
                    <div className="preview-meta">{familyValue} · {line}</div>
                  </div>
                </div>
              )}
            </>
          )}

          <div className="form-row">
            <label className="form-label">Nombre</label>
            <input
              className="form-input"
              type="text"
              placeholder="Ej: Azul Marino Mate"
              value={name}
              onChange={(e) => setName(e.target.value)}
              autoFocus={mode === "manual"}
              required
            />
          </div>

          <div className="form-row form-row--split">
            <div className="form-row">
              <label className="form-label">Familia</label>
              <select
                className="form-select"
                value={family}
                onChange={(e) => setFamily(e.target.value)}
              >
                {existingFamilies.map((f) => (
                  <option key={f.name} value={f.name}>{f.name}</option>
                ))}
                <option value="__new__">+ Nueva familia…</option>
              </select>
              {family === "__new__" && (
                <input
                  className="form-input"
                  type="text"
                  placeholder="Nombre de la familia"
                  value={newFamily}
                  onChange={(e) => setNewFamily(e.target.value)}
                  style={{ marginTop: 6 }}
                  required
                />
              )}
            </div>
            <div className="form-row">
              <label className="form-label">Línea</label>
              <input
                className="form-input"
                type="text"
                placeholder="Basic, Matte, Silk…"
                value={line}
                onChange={(e) => setLine(e.target.value)}
              />
            </div>
          </div>

          <div className="form-row">
            <label className="form-label">Color principal</label>
            <div className="form-color-row">
              <input
                type="color"
                value={color}
                onChange={(e) => setColor(e.target.value)}
              />
              <input
                className="form-input"
                type="text"
                value={color}
                onChange={(e) => setColor(e.target.value)}

              />
            </div>
          </div>

          <label className="form-toggle">
            <input
              type="checkbox"
              checked={useColor2}
              onChange={(e) => setUseColor2(e.target.checked)}

          {useColor2 && (
            <div className="form-row">
              <label className="form-label">Color secundario</label>

                  type="color"

                  onChange={(e) => setColor2(e.target.value)}
                />
                <input
                  className="form-input"
                  type="text"
                  value={color2}
                  onChange={(e) => setColor2(e.target.value)}

                />

          <div className="form-row">
            <label className="form-label">Acabado</label>

              {FINISH_OPTIONS.map(([v, l]) => (
                <option key={v} value={v}>{l}</option>

          <div className="form-row form-row--split">
            <div className="form-row">
              <label className="form-label">Precio CLP</label>
              <input
                className="form-input"
                type="number"
                min="0"

            <div className="form-row">
              <label className="form-label">Peso</label>
              <input
                className="form-input"
                type="text"

            <div className="form-row">
              <label className="form-label">Temp. boquilla</label>

        <div className="modal-foot">

          </button>
        </div>
      </form>
    </div>
  );
}

// ===== New spool modal =====
function NewSpoolModal({ data, initialFilamentId, onCreate, onClose }) {
  const [filamentId, setFilamentId] = useState(initialFilamentId || "");
  const [initialG, setInitialG] = useState("1000");
  const [label, setLabel] = useState("");
  const [query, setQuery] = useState("");

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return data.slice(0, 40);
    return data.filter((f) => `${f.family} ${f.line} ${f.name} ${f.code || ""}`.toLowerCase().includes(q)).slice(0, 60);
  }, [data, query]);

  const selected = filamentId ? data.find((f) => f.id === filamentId) : null;
  const g = parseGrams(initialG);
  const canSubmit = !!selected && isFinite(g) && g > 0;

  useEffect(() => {
    if (selected) setInitialG(String(weightToGrams(selected.weight)));
  }, [filamentId]); // eslint-disable-line

  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    onCreate({
      id: `spool-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      filamentId: selected.id,
      createdAt: new Date().toISOString(),
      initialG: g,
      label: label.trim(),
      entries: [],
    });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <form className="modal" onClick={(e) => e.stopPropagation()} onSubmit={submit}>
        <div className="modal-head">
          <div className="modal-title">Nuevo carrete</div>
          <button type="button" className="icon-btn" onClick={onClose} aria-label="Cerrar"><Icon.X /></button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <label className="form-label">Filamento</label>
            {selected ? (
              <div className="preview-row">
                <div className="preview-swatch" style={{ background: selected.color2 ? `linear-gradient(135deg, ${selected.color} 0%, ${selected.color} 48%, ${selected.color2} 52%, ${selected.color2} 100%)` : selected.color }} />
                <div className="preview-info">
                  <div className="preview-name">{selected.name}</div>
                  <div className="preview-meta">{selected.family} · {selected.line}{selected.code ? ` · #${selected.code}` : ""}</div>
                </div>
                <button type="button" className="link-btn" onClick={() => setFilamentId("")} style={{ marginLeft: "auto" }}>Cambiar</button>
              </div>
            ) : (
              <>
                <input className="form-input" type="text" autoFocus placeholder="Buscar por nombre, familia o código…" value={query} onChange={(e) => setQuery(e.target.value)} />
                <div className="spool-picker">
                  {filtered.map((f) => (
                    <button type="button" key={f.id} className="spool-picker-item" onClick={() => setFilamentId(f.id)}>
                      <span className="spool-picker-swatch" style={{ background: f.color2 ? `linear-gradient(135deg, ${f.color} 0%, ${f.color} 48%, ${f.color2} 52%, ${f.color2} 100%)` : f.color }} />
                      <span className="spool-picker-text">
                        <span className="spool-picker-name">{f.name}</span>
                        <span className="spool-picker-meta">{f.family} · {f.line}{f.code ? ` · #${f.code}` : ""}</span>
                      </span>
                    </button>
                  ))}
                  {filtered.length === 0 && <div className="form-help">Sin resultados</div>}
                </div>
              </>
            )}
          </div>

          <div className="form-row form-row--split">
            <div className="form-row">
              <label className="form-label">Peso inicial (g)</label>
              <input className="form-input" type="text" inputMode="decimal" value={initialG} onChange={(e) => setInitialG(e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Etiqueta (opcional)</label>
              <input className="form-input" type="text" placeholder="Ej: Carrete #2" value={label} onChange={(e) => setLabel(e.target.value)} />
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button type="button" className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn btn-primary" disabled={!canSubmit}>Crear carrete</button>
        </div>
      </form>
    </div>
  );
}

// ===== Spool card =====
function SpoolCard({ spool, filament, onAddEntry, onRemoveEntry, onDelete }) {
  const [grams, setGrams] = useState("");
  const [note, setNote] = useState("");
  const [date, setDate] = useState(todayISO());

  const used = spoolUsed(spool);
  const remaining = spoolRemaining(spool);
  const pctUsed = spool.initialG > 0 ? Math.min(100, (used / spool.initialG) * 100) : 0;
  const pctRem = 100 - pctUsed;

  const add = (e) => {
    e.preventDefault();
    const g = parseGrams(grams);
    if (!isFinite(g) || g <= 0) return;
    onAddEntry(spool.id, {
      id: `u-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
      date: date || todayISO(),
      grams: g,
      note: note.trim(),
    });
    setGrams("");
    setNote("");
  };

  const color = filament?.color || "#888";
  const color2 = filament?.color2;
  const swatchBg = color2 ? `linear-gradient(135deg, ${color} 0%, ${color} 48%, ${color2} 52%, ${color2} 100%)` : color;

  return (
    <div className="spool-card">
      <div className="spool-card-head">
        <div className="spool-card-swatch" style={{ background: swatchBg }} />
        <div className="spool-card-title">
          <div className="spool-card-name">
            {filament ? filament.name : "Filamento eliminado"}
            {spool.label && <span className="spool-card-label"> · {spool.label}</span>}
          </div>
          <div className="spool-card-meta">
            {filament ? `${filament.family} · ${filament.line}${filament.code ? ` · #${filament.code}` : ""}` : ""}
          </div>
        </div>
        <button className="icon-btn" onClick={() => onDelete(spool.id)} title="Eliminar carrete"><Icon.Trash /></button>
      </div>

      <div className="spool-progress">
        <div className="spool-progress-bar">
          <div className="spool-progress-fill" style={{ width: `${pctRem}%` }} />
        </div>
        <div className="spool-progress-stats">
          <div><span className="spool-stat-label">Restante</span><span className="spool-stat-value">{formatG(remaining)}</span></div>
          <div><span className="spool-stat-label">Usado</span><span className="spool-stat-value">{formatG(used)}</span></div>
          <div><span className="spool-stat-label">Inicial</span><span className="spool-stat-value">{formatG(spool.initialG)}</span></div>
          <div><span className="spool-stat-label">%</span><span className="spool-stat-value">{pctRem.toFixed(1)}%</span></div>
        </div>
      </div>

      <form className="spool-add" onSubmit={add}>
        <input type="text" inputMode="decimal" className="form-input" placeholder="Gramos usados" value={grams} onChange={(e) => setGrams(e.target.value)} />
        <input type="text" className="form-input" placeholder="Nota / proyecto (opcional)" value={note} onChange={(e) => setNote(e.target.value)} />
        <input type="date" className="form-input spool-add-date" value={date} onChange={(e) => setDate(e.target.value)} />
        <button type="submit" className="btn btn-primary" disabled={!isFinite(parseGrams(grams)) || parseGrams(grams) <= 0}>
          <Icon.Minus /> Registrar
        </button>
      </form>

      {spool.entries && spool.entries.length > 0 && (
        <div className="spool-entries">
          {spool.entries.slice().reverse().map((e) => (
            <div key={e.id} className="spool-entry">
              <span className="spool-entry-date">{e.date}</span>
              <span className="spool-entry-grams">-{formatG(e.grams)}</span>
              <span className="spool-entry-note">{e.note || "—"}</span>
              <button className="icon-btn" onClick={() => onRemoveEntry(spool.id, e.id)} title="Eliminar uso"><Icon.X /></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== Spools view =====
function SpoolsView({ spools, data, onAddEntry, onRemoveEntry, onDelete, onNew }) {
  const filamentById = useMemo(() => {
    const m = new Map();
    for (const f of data) m.set(f.id, f);
    return m;
  }, [data]);

  const totals = useMemo(() => {
    let initial = 0, used = 0, remaining = 0;
    for (const sp of spools) {
      initial += sp.initialG || 0;
      used += spoolUsed(sp);
      remaining += spoolRemaining(sp);
    }
    return { initial, used, remaining };
  }, [spools]);

  const sorted = useMemo(() => {
    return spools.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  }, [spools]);

  return (
    <>
      <div className="spool-totals">
        <div className="spool-total"><div className="spool-total-label">Carretes</div><div className="spool-total-value">{spools.length}</div></div>
        <div className="spool-total"><div className="spool-total-label">Restante total</div><div className="spool-total-value">{formatG(totals.remaining)}</div></div>
        <div className="spool-total"><div className="spool-total-label">Usado total</div><div className="spool-total-value">{formatG(totals.used)}</div></div>
        <div className="spool-total"><div className="spool-total-label">Inicial total</div><div className="spool-total-value">{formatG(totals.initial)}</div></div>
      </div>

      {sorted.length === 0 ? (
        <div className="empty">
          <div className="empty-title">Aún no tienes carretes registrados</div>
          <div>Crea uno para empezar a llevar el gasto de gramos por impresión.</div>
          <div style={{ marginTop: 14 }}>
            <button className="btn btn-primary" onClick={onNew}><Icon.Plus /> Nuevo carrete</button>
          </div>
        </div>
      ) : (
        <div className="spool-list">
          {sorted.map((sp) => (
            <SpoolCard
              key={sp.id}
              spool={sp}
              filament={filamentById.get(sp.filamentId)}
              onAddEntry={onAddEntry}
              onRemoveEntry={onRemoveEntry}
              onDelete={onDelete}
            />
          ))}
        </div>
      )}
    </>
  );
}

// ===== Calculator view =====
const CALC_DEFAULTS = {
  filamentId: "",
  filamentPricePerKg: 16990,
  grams: 50,
  printHours: 2,
  printMinutes: 30,
  printerWatts: 150,
  kwhCost: 150,
  failureRatePct: 5,
  wearPerHour: 200,
  laborHours: 0,
  laborMinutes: 15,
  laborRate: 8000,
  postProcessing: 0,
  packaging: 500,
  marginPct: 60,
  ivaPct: 19,
  includeIva: false,
};

function CalculatorView({ calc, setCalc, data, inventory }) {
  const set = (k, v) => setCalc((c) => ({ ...c, [k]: v }));
  const num = (v, fallback = 0) => {
    const n = parseFloat(v);
    return isNaN(n) ? fallback : n;
  };

  const ownedFilaments = useMemo(
    () => data.filter((f) => {
      const inv = inventory[f.id];
      return inv?.owned || (inv?.quantity || 0) > 0;
    }),
    [data, inventory]
  );

  const selectedFilament = calc.filamentId ? data.find((f) => f.id === calc.filamentId) : null;

  useEffect(() => {
    if (selectedFilament) {
      const inv = inventory[selectedFilament.id];
      const price = inv?.customPrice != null ? inv.customPrice : selectedFilament.priceCLP;
      if (price && price !== calc.filamentPricePerKg) {
        setCalc((c) => ({ ...c, filamentPricePerKg: price }));
      }
    }
  }, [calc.filamentId]);

  const grams = num(calc.grams);
  const pricePerKg = num(calc.filamentPricePerKg);
  const printHoursTotal = num(calc.printHours) + num(calc.printMinutes) / 60;
  const printerWatts = num(calc.printerWatts);
  const kwhCost = num(calc.kwhCost);
  const failurePct = num(calc.failureRatePct);
  const wearPerHour = num(calc.wearPerHour);
  const laborHoursTotal = num(calc.laborHours) + num(calc.laborMinutes) / 60;
  const laborRate = num(calc.laborRate);
  const postProcessing = num(calc.postProcessing);
  const packaging = num(calc.packaging);
  const marginPct = num(calc.marginPct);
  const ivaPct = num(calc.ivaPct);

  const filamentCost = (grams / 1000) * pricePerKg;
  const electricityCost = (printerWatts / 1000) * printHoursTotal * kwhCost;
  const wearCost = printHoursTotal * wearPerHour;
  const laborCost = laborHoursTotal * laborRate;

  const baseCost = filamentCost + electricityCost + wearCost + laborCost + postProcessing + packaging;
  const failureAdjusted = baseCost * (1 + failurePct / 100);
  const totalCost = failureAdjusted;

  const priceBeforeIva = totalCost * (1 + marginPct / 100);
  const finalPrice = calc.includeIva ? priceBeforeIva * (1 + ivaPct / 100) : priceBeforeIva;
  const profit = priceBeforeIva - totalCost;

  const rows = [
    { label: "Filamento", value: filamentCost, hint: `${grams} g × ${formatCLP(pricePerKg / 1000)}/g` },
    { label: "Electricidad", value: electricityCost, hint: `${printerWatts} W × ${printHoursTotal.toFixed(2)} h × ${formatCLP(kwhCost)}/kWh` },
    { label: "Desgaste / mantenimiento", value: wearCost, hint: `${printHoursTotal.toFixed(2)} h × ${formatCLP(wearPerHour)}/h` },
    { label: "Diseño / mano de obra", value: laborCost, hint: `${laborHoursTotal.toFixed(2)} h × ${formatCLP(laborRate)}/h` },
    { label: "Post-procesado", value: postProcessing },
    { label: "Embalaje", value: packaging },
  ];

  return (
    <div className="calc">
      <div className="calc-grid">
        <section className="calc-card">
          <h3 className="calc-section-title">Filamento</h3>

          <div className="form-row">
            <label className="form-label">Filamento usado</label>
            <select
              className="form-select"
              value={calc.filamentId}
              onChange={(e) => set("filamentId", e.target.value)}
            >
              <option value="">— Precio manual —</option>
              {ownedFilaments.length > 0 && (
                <optgroup label="Los que tengo">
                  {ownedFilaments.map((f) => (
                    <option key={f.id} value={f.id}>
                      {f.family} {f.line} · {f.name}{f.code ? ` (#${f.code})` : ""}
                    </option>
                  ))}
                </optgroup>
              )}
              <optgroup label="Todo el catálogo">
                {data.filter((f) => !ownedFilaments.includes(f)).map((f) => (
                  <option key={f.id} value={f.id}>
                    {f.family} {f.line} · {f.name}{f.code ? ` (#${f.code})` : ""}
                  </option>
                ))}
              </optgroup>
            </select>
            {selectedFilament && (
              <div className="calc-preview">
                <div
                  className="preview-swatch"
                  style={{
                    background: selectedFilament.color2
                      ? `linear-gradient(135deg, ${selectedFilament.color} 0%, ${selectedFilament.color} 48%, ${selectedFilament.color2} 52%, ${selectedFilament.color2} 100%)`
                      : selectedFilament.color,
                  }}
                />
                <div className="preview-info">
                  <div className="preview-name">{selectedFilament.name}</div>
                  <div className="preview-meta">{selectedFilament.family} · {selectedFilament.line}</div>
                </div>
              </div>
            )}
          </div>

          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">Precio por kg (CLP)</label>
              <input type="number" className="form-input" value={calc.filamentPricePerKg}
                onChange={(e) => set("filamentPricePerKg", e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Gramos usados</label>
              <input type="number" className="form-input" value={calc.grams}
                onChange={(e) => set("grams", e.target.value)} />
            </div>
          </div>
        </section>

        <section className="calc-card">
          <h3 className="calc-section-title">Tiempo de impresión</h3>
          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">Horas</label>
              <input type="number" className="form-input" value={calc.printHours}
                onChange={(e) => set("printHours", e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Minutos</label>
              <input type="number" className="form-input" value={calc.printMinutes}
                onChange={(e) => set("printMinutes", e.target.value)} />
            </div>
          </div>
          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">Potencia impresora (W)</label>
              <input type="number" className="form-input" value={calc.printerWatts}
                onChange={(e) => set("printerWatts", e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Costo kWh (CLP)</label>
              <input type="number" className="form-input" value={calc.kwhCost}
                onChange={(e) => set("kwhCost", e.target.value)} />
            </div>
          </div>
          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">Desgaste / hora (CLP)</label>
              <input type="number" className="form-input" value={calc.wearPerHour}
                onChange={(e) => set("wearPerHour", e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Tasa de falla (%)</label>
              <input type="number" className="form-input" value={calc.failureRatePct}
                onChange={(e) => set("failureRatePct", e.target.value)} />
            </div>
          </div>
        </section>

        <section className="calc-card">
          <h3 className="calc-section-title">Mano de obra y extras</h3>
          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">Horas diseño/trabajo</label>
              <input type="number" className="form-input" value={calc.laborHours}
                onChange={(e) => set("laborHours", e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Minutos</label>
              <input type="number" className="form-input" value={calc.laborMinutes}
                onChange={(e) => set("laborMinutes", e.target.value)} />
            </div>
          </div>
          <div className="form-row">
            <label className="form-label">Tarifa por hora (CLP)</label>
            <input type="number" className="form-input" value={calc.laborRate}
              onChange={(e) => set("laborRate", e.target.value)} />
          </div>
          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">Post-procesado (CLP)</label>
              <input type="number" className="form-input" value={calc.postProcessing}
                onChange={(e) => set("postProcessing", e.target.value)} />
            </div>
            <div className="form-row">
              <label className="form-label">Embalaje (CLP)</label>
              <input type="number" className="form-input" value={calc.packaging}
                onChange={(e) => set("packaging", e.target.value)} />
            </div>
          </div>
        </section>

        <section className="calc-card">
          <h3 className="calc-section-title">Margen y precio</h3>
          <div className="form-row">
            <label className="form-label">Margen de utilidad (%)</label>
            <input type="number" className="form-input" value={calc.marginPct}
              onChange={(e) => set("marginPct", e.target.value)} />
          </div>
          <div className="form-row--split">
            <div className="form-row">
              <label className="form-label">IVA (%)</label>
              <input type="number" className="form-input" value={calc.ivaPct}
                onChange={(e) => set("ivaPct", e.target.value)} />
            </div>
            <label className="form-toggle" style={{ alignSelf: "end" }}>
              <input type="checkbox" checked={calc.includeIva}
                onChange={(e) => set("includeIva", e.target.checked)} />
              Incluir IVA en precio final
            </label>
          </div>
        </section>
      </div>

      <section className="calc-result">
        <div className="calc-result-head">
          <div>
            <div className="calc-result-label">Precio sugerido de venta</div>
            <div className="calc-result-price">{formatCLP(finalPrice)}</div>
            {calc.includeIva && (
              <div className="calc-result-sub">Neto: {formatCLP(priceBeforeIva)} · IVA: {formatCLP(priceBeforeIva * ivaPct / 100)}</div>
            )}
          </div>
          <div className="calc-result-side">
            <div>
              <div className="calc-result-label">Costo total</div>
              <div className="calc-result-cost">{formatCLP(totalCost)}</div>
            </div>
            <div>
              <div className="calc-result-label">Utilidad</div>
              <div className="calc-result-profit">{formatCLP(profit)}</div>
            </div>
          </div>
        </div>

        <div className="calc-breakdown">
          <div className="calc-breakdown-title">Desglose de costos</div>
          {rows.map((r) => (
            <div key={r.label} className="calc-row">
              <div className="calc-row-label">
                {r.label}
                {r.hint && <span className="calc-row-hint">{r.hint}</span>}
              </div>
              <div className="calc-row-value">{formatCLP(r.value)}</div>
            </div>
          ))}
          <div className="calc-row calc-row--sub">
            <div className="calc-row-label">Subtotal</div>
            <div className="calc-row-value">{formatCLP(baseCost)}</div>
          </div>
          <div className="calc-row">
            <div className="calc-row-label">
              Ajuste por fallas
              <span className="calc-row-hint">+{failurePct}%</span>
            </div>
            <div className="calc-row-value">{formatCLP(failureAdjusted - baseCost)}</div>
          </div>
          <div className="calc-row calc-row--total">
            <div className="calc-row-label">Costo total</div>
            <div className="calc-row-value">{formatCLP(totalCost)}</div>
          </div>
        </div>
      </section>
    </div>
  );
}

// ===== App =====
function App() {
  const [inventory, setInventory] = useLocal(STORAGE_KEY, {});
  const [tweaks, setTweaks]       = useLocal(TWEAKS_KEY, TWEAK_DEFAULTS);
  const [customs, setCustoms]     = useLocal(CUSTOMS_KEY, { items: [] });
  const [spoolsState, setSpoolsState] = useLocal(SPOOLS_KEY, { items: [] });
  const [calc, setCalc] = useLocal(CALC_KEY, CALC_DEFAULTS);
  const [selectedId, setSelectedId] = useState(null);
  const [query, setQuery] = useState("");
  const [activeFamily, setActiveFamily] = useState("Todos");
  const [ownedOnly, setOwnedOnly] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [view, setView] = useState("catalog"); // "catalog" | "spools" | "calculator"
  const [showNewSpool, setShowNewSpool] = useState(false);
  const [newSpoolFilamentId, setNewSpoolFilamentId] = useState("");

  const spools = spoolsState.items || [];

  const addSpool = useCallback((spool) => {
    setSpoolsState((prev) => ({ ...prev, items: [...(prev.items || []), spool] }));
  }, []);
  const addSpoolEntry = useCallback((spoolId, entry) => {
    setSpoolsState((prev) => ({
      ...prev,
      items: (prev.items || []).map((s) => s.id === spoolId ? { ...s, entries: [...(s.entries || []), entry] } : s),
    }));
  }, []);
  const removeSpoolEntry = useCallback((spoolId, entryId) => {
    setSpoolsState((prev) => ({
      ...prev,
      items: (prev.items || []).map((s) => s.id === spoolId ? { ...s, entries: (s.entries || []).filter((e) => e.id !== entryId) } : s),
    }));
  }, []);
  const deleteSpool = useCallback((spoolId) => {
    if (!window.confirm("¿Eliminar este carrete y todos sus registros?")) return;
    setSpoolsState((prev) => ({ ...prev, items: (prev.items || []).filter((s) => s.id !== spoolId) }));
  }, []);

  const data = useMemo(
    () => [...window.FILAMENT_DATA, ...(customs.items || [])],
    [customs.items]
  );

  const addCustom = useCallback((item) => {
    setCustoms((prev) => ({ ...prev, items: [...(prev.items || []), item] }));
  }, []);
  const deleteCustom = useCallback((id) => {
    setCustoms((prev) => ({ ...prev, items: (prev.items || []).filter((x) => x.id !== id) }));
    setInventory((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
    setSelectedId(null);
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme || "light");
  }, [tweaks.theme]);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--swatch-size", `${tweaks.swatchSize || 64}px`);
    const gap = tweaks.density === "tight" ? 6 : tweaks.density === "roomy" ? 16 : 10;
    root.style.setProperty("--swatch-gap", `${gap}px`);
  }, [tweaks.swatchSize, tweaks.density]);

  const families = useMemo(() => {
    const map = new Map();
    for (const f of data) {
      if (!map.has(f.family)) map.set(f.family, 0);
      map.set(f.family, map.get(f.family) + 1);
    }
    return Array.from(map.entries()).map(([name, count]) => ({ name, count }));
  }, [data]);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return data.filter((f) => {
      if (activeFamily !== "Todos" && f.family !== activeFamily) return false;
      if (ownedOnly && !(inventory[f.id]?.owned)) return false;
      if (q) {
        const hay = `${f.family} ${f.line} ${f.name} ${f.color} ${f.code || ""}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [data, query, activeFamily, ownedOnly, inventory]);

  const grouped = useMemo(() => {
    const byFamily = new Map();
    for (const f of filtered) {
      if (!byFamily.has(f.family)) byFamily.set(f.family, new Map());
      const lines = byFamily.get(f.family);
      if (!lines.has(f.line)) lines.set(f.line, []);
      lines.get(f.line).push(f);
    }
    return byFamily;
  }, [filtered]);

  const stats = useMemo(() => {
    let ownedTypes = 0, rolls = 0, invested = 0;
    for (const f of data) {
      const inv = inventory[f.id];
      if (inv?.owned || (inv?.quantity || 0) > 0) ownedTypes += 1;
      if (inv?.quantity) rolls += inv.quantity;
      if (inv?.quantity) invested += (inv.customPrice != null ? inv.customPrice : f.priceCLP) * inv.quantity;
    }
    return { ownedTypes, rolls, invested, total: data.length };
  }, [data, inventory]);

  const updateInventory = useCallback((id, patch) => {
    setInventory((prev) => ({ ...prev, [id]: { ...(prev[id] || {}), ...patch } }));
  }, []);

  const selected = selectedId ? data.find((f) => f.id === selectedId) : null;

  return (
    <div className={`app ${selected ? "app--detail-open" : ""}`}>
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark" />
          <div className="brand-name">
            Filamentos
            <span>Inventario 3D</span>
          </div>
        </div>

        <div className="nav-section">Vistas</div>
        <button
          className={`nav-item ${view === "catalog" ? "nav-item--active" : ""}`}
          onClick={() => setView("catalog")}
        >
          <span><Icon.Grid /> &nbsp;Catálogo</span>
        </button>
        <button
          className={`nav-item ${view === "spools" ? "nav-item--active" : ""}`}
          onClick={() => setView("spools")}
        >
          <span><Icon.Spool /> &nbsp;Carretes</span>
          <span className="nav-count">{spools.length}</span>
        </button>
        <button
          className={`nav-item ${view === "calculator" ? "nav-item--active" : ""}`}
          onClick={() => setView("calculator")}
        >
          <span><Icon.Sliders /> &nbsp;Calculadora</span>
        </button>

        <div className="nav-section">Familias</div>
        <button
          className={`nav-item ${view === "catalog" && activeFamily === "Todos" ? "nav-item--active" : ""}`}
          onClick={() => { setView("catalog"); setActiveFamily("Todos"); }}
        >
          <span>Todos</span>
          <span className="nav-count">{data.length}</span>
        </button>
        {families.map((f) => (
          <button
            key={f.name}
            className={`nav-item ${view === "catalog" && activeFamily === f.name ? "nav-item--active" : ""}`}
            onClick={() => { setView("catalog"); setActiveFamily(f.name); }}
          >
            <span>{f.name}</span>
            <span className="nav-count">{f.count}</span>
          </button>
        ))}

        <div className="sidebar-stats">
          <div className="stat">
            <div className="stat-label">En mi inventario</div>
            <div className="stat-value">{stats.ownedTypes}<span style={{color:"var(--muted)",fontWeight:400,fontSize:13}}> / {stats.total}</span></div>
            <div className="stat-sub">tipos distintos</div>
          </div>
          <div className="stat">
            <div className="stat-label">Rollos totales</div>
            <div className="stat-value">{stats.rolls}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Invertido</div>
            <div className="stat-value" style={{fontSize:16}}>{formatCLP(stats.invested)}</div>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="main-head">
          <div>
            <h1 className="main-title">
              {view === "spools"
                ? "Carretes"
                : view === "calculator"
                  ? "Calculadora de costo y precio"
                  : (activeFamily === "Todos" ? "Catálogo completo" : activeFamily)}
            </h1>
            <div className="main-sub">
              {view === "spools"
                ? `${spools.length} carrete${spools.length === 1 ? "" : "s"} registrado${spools.length === 1 ? "" : "s"}`
                : view === "calculator"
                  ? "Estima el costo real de impresión y un precio sugerido de venta."
                  : (<>{filtered.length} filamento{filtered.length === 1 ? "" : "s"}{ownedOnly ? " · solo los que tengo" : ""}{query ? ` · "${query}"` : ""}</>)}
            </div>
          </div>
        </div>

        {view !== "calculator" && (
        <div className="toolbar">
          {view === "catalog" ? (
            <>
              <div className="search">
                <span className="search-icon"><Icon.Search /></span>
                <input
                  type="text"
                  placeholder="Buscar por nombre, tipo o color…"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                />
                {query && (
                  <button className="search-clear" onClick={() => setQuery("")} aria-label="Limpiar">
                    <Icon.X />
                  </button>
                )}
              </div>
              <button
                className={`chip ${ownedOnly ? "chip--active" : ""}`}
                onClick={() => setOwnedOnly((v) => !v)}
              >
                <Icon.Check /> Solo los que tengo
              </button>
              <button className="chip" onClick={() => setShowAdd(true)} title="Agregar color personalizado">
                <Icon.Plus /> Agregar color
              </button>
            </>
          ) : (
            <button className="chip chip--active" onClick={() => { setNewSpoolFilamentId(""); setShowNewSpool(true); }}>
              <Icon.Plus /> Nuevo carrete
            </button>
          )}
          <div className="toolbar-sep" />
          <button
            className={`chip ${tweaks.showTweaks ? "chip--active" : ""}`}
            onClick={() => setTweaks((t) => ({ ...t, showTweaks: !t.showTweaks }))}
            title="Alternar panel de ajustes visuales"
          >
            <Icon.Sliders /> Tweaks
          </button>
        </div>
        )}

        {view === "calculator" ? (
          <CalculatorView calc={calc} setCalc={setCalc} data={data} inventory={inventory} />
        ) : view === "spools" ? (
          <SpoolsView
            spools={spools}
            data={data}
            onAddEntry={addSpoolEntry}
            onRemoveEntry={removeSpoolEntry}
            onDelete={deleteSpool}
            onNew={() => { setNewSpoolFilamentId(""); setShowNewSpool(true); }}
          />
        ) : filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-title">Sin resultados</div>
            <div>Probá con otro término o quita los filtros.</div>
          </div>
        ) : (
          Array.from(grouped.entries()).map(([familyName, lines]) => (
            <section key={familyName} className="family-section">
              <div className="family-head">
                <div className="family-title">
                  <h2>{familyName}</h2>
                  <span className="family-title-count">
                    {Array.from(lines.values()).reduce((s, a) => s + a.length, 0)}
                  </span>
                </div>
              </div>

              {Array.from(lines.entries()).map(([lineName, items]) => (
                <div key={lineName} className="line-group">
                  <div className="line-head">{lineName}</div>
                  <div className="swatch-grid">
                    {items.map((item) => {
                      const inv = inventory[item.id];
                      return (
                        <Swatch
                          key={item.id}
                          item={item}
                          size={tweaks.swatchSize || 64}
                          shape={tweaks.swatchShape || "rounded"}
                          owned={!!inv?.owned || (inv?.quantity || 0) > 0}
                          selected={selectedId === item.id}
                          onClick={() => setSelectedId(item.id)}
                        />
                      );
                    })}
                  </div>
                </div>
              ))}
            </section>
          ))
        )}
      </main>

      {selected && (
        <DetailPanel
          item={selected}
          inventory={inventory}
          onUpdate={updateInventory}
          onDelete={deleteCustom}
          onClose={() => setSelectedId(null)}
          spools={spools}
          onCreateSpool={(fid) => { setNewSpoolFilamentId(fid); setShowNewSpool(true); }}
          onOpenSpools={() => setView("spools")}
        />
      )}

      {tweaks.showTweaks && (
        <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />
      )}

      {showAdd && (
        <AddFilamentModal
          existingFamilies={families}
          existingCodes={new Set(data.filter((f) => f.code).map((f) => f.code))}
          onAdd={addCustom}
          onClose={() => setShowAdd(false)}
        />
      )}

      {showNewSpool && (
        <NewSpoolModal
          data={data}
          initialFilamentId={newSpoolFilamentId}
          onCreate={addSpool}
          onClose={() => setShowNewSpool(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
